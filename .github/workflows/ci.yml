name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests
      - name: Verify installed CLI
        run: |
          python -m pip install .
          agent-workbench demo --output /tmp/agent-workbench-demo --proof /tmp/agent-workbench-demo/proof.json
          agent-workbench demo --output /tmp/agent-workbench-demo-report --report /tmp/agent-workbench-demo-report/demo-report.md
          agent-workbench demo --template typescript --output /tmp/agent-workbench-demo-ts --report /tmp/agent-workbench-demo-ts/demo-report.md
          test -f /tmp/agent-workbench-demo/.agent-workbench/AGENTS.md
          test -f /tmp/agent-workbench-demo/.agent-workbench/agent-task-pack.md
          test -f /tmp/agent-workbench-demo-report/demo-report.md
          test -f /tmp/agent-workbench-demo-ts/demo-report.md
          grep -q "Agent Workbench Demo Report" /tmp/agent-workbench-demo-report/demo-report.md
          grep -q "Status: ready (10 pass, 0 warn, 0 fail)" /tmp/agent-workbench-demo-report/demo-report.md
          grep -q "Share Feedback" /tmp/agent-workbench-demo-report/demo-report.md
          grep -q "Copy/paste summary" /tmp/agent-workbench-demo-report/demo-report.md
          grep -q "<repo>" /tmp/agent-workbench-demo-report/demo-report.md
          grep -q "<workbench>" /tmp/agent-workbench-demo-report/demo-report.md
          grep -q "<demo-workspace>" /tmp/agent-workbench-demo-report/demo-report.md
          grep -q "<report>" /tmp/agent-workbench-demo-report/demo-report.md
          ! grep -q "/tmp/agent-workbench-demo-report" /tmp/agent-workbench-demo-report/demo-report.md
          grep -q "npm test" /tmp/agent-workbench-demo-ts/demo-report.md
          python - <<'PY'
          import json
          from pathlib import Path

          proof = json.loads(Path("/tmp/agent-workbench-demo/proof.json").read_text(encoding="utf-8"))
          if proof["kind"] != "agent_workbench.proof" or proof["schema_version"] != 1:
              raise SystemExit((proof.get("kind"), proof.get("schema_version")))
          if proof["readiness"]["status"] != "ready":
              raise SystemExit(proof["readiness"])
          if proof["readiness"]["counts"] != {"pass": 10, "warn": 0, "fail": 0}:
              raise SystemExit(proof["readiness"])
          if proof["handoff"]["next_action"] != proof["next_action"]:
              raise SystemExit(proof["handoff"])
          if not proof["handoff"]["agents_md"].endswith("AGENTS.md"):
              raise SystemExit(proof["handoff"])
          if not proof["handoff"]["task_pack"].endswith("agent-task-pack.md"):
              raise SystemExit(proof["handoff"])
          if len(proof["artifact_summary"]["adapter_files"]) != 4:
              raise SystemExit(proof["artifact_summary"])
          if "Agent Workbench turned this repo into an AI-agent-ready workspace" not in proof["share_snippet"]:
              raise SystemExit(proof["share_snippet"])
          if "4 adapter handoffs" not in proof["share_snippet"]:
              raise SystemExit(proof["share_snippet"])
          if "issues/new?template=agent-workbench-report.yml" not in proof["feedback"]["url"]:
              raise SystemExit(proof["feedback"])
          if "Do not include tokens" not in proof["feedback"]["safety_note"]:
              raise SystemExit(proof["feedback"])
          if "--adapter all --strict --format json" not in proof["readiness_command"]:
              raise SystemExit(proof["readiness_command"])
          if proof["readiness_args"][:2] != ["agent-workbench", "check"]:
              raise SystemExit(proof["readiness_args"])
          if proof["readiness_args"][-2:] != ["--format", "json"]:
              raise SystemExit(proof["readiness_args"])
          PY
