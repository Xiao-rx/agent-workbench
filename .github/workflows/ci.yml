name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests
      - name: Verify installed CLI
        run: |
          python -m pip install .
          agent-workbench demo --output /tmp/agent-workbench-demo
          test -f /tmp/agent-workbench-demo/.agent-workbench/AGENTS.md
          test -f /tmp/agent-workbench-demo/.agent-workbench/agent-task-pack.md
